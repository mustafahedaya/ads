<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPlay - Rewards & PRO</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Ad Script -->
    <script data-cfasync="false" src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1232573"></script>
    <style>
        :root {
            --bg-dark: #08080a;
            --card-bg: rgba(22, 22, 26, 0.7);
            --accent-primary: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --accent-gold: linear-gradient(135deg, #FFD700, #FFA500);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(108, 92, 231, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
        p { color: var(--text-dim); font-size: 1rem; line-height: 1.6; margin-bottom: 2.5rem; }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            margin-bottom: 12px;
            text-align: center;
        }

        .btn-ad { background: var(--accent-primary); color: white; box-shadow: 0 10px 20px -5px rgba(108, 92, 231, 0.4); }
        .btn-pro { background: var(--accent-gold); color: #1a1a1a; position: relative; overflow: hidden; }

        .btn-pro::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg); animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .btn:hover { transform: translateY(-4px); filter: brightness(1.1); }
        .timer-text { color: #bb86fc; font-weight: 800; padding: 2px 8px; background: rgba(187, 134, 252, 0.1); border-radius: 6px; }
        .success-text { color: #00f2fe; font-weight: bold; }
        .error-text { color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 8px; border-radius: 12px; font-size: 0.85rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div id="icon-box" class="icon-circle">🎁</div>
            <h2 id="title">Reward Center</h2>
            <p id="desc">Watch a short ad to receive <br><strong>10 extra coins</strong> instantly.</p>

            <button id="ad-btn" class="btn btn-ad">Watch Ad & Get Coins</button>
            <a id="pro-btn" href="#" target="_blank" class="btn btn-pro">👑 Get PRO (Unlimited)</a>

            <div id="status-msg" style="margin-top: 20px; font-weight: 600; min-height: 30px;"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const extId = urlParams.get('extId');
        
        const adBtn = document.getElementById('ad-btn');
        const proBtn = document.getElementById('pro-btn');
        const statusMsg = document.getElementById('status-msg');
        const iconBox = document.getElementById('icon-box');

        const adUrl = "https://chewsever.com/bfrw20vf?key=f048a8513d05e6812b477ab2bdca93ad";
        proBtn.href = "https://mustafahedaya.github.io/ads/pay.html" + (extId ? "?extId=" + extId : "");

        let adWindow = null;
        let timeLeft = 5;
        let monitorInterval = null;
        let checkFails = 0;

        adBtn.onclick = function() {
            // Reset
            timeLeft = 5;
            checkFails = 0;
            if (monitorInterval) clearInterval(monitorInterval);

            // Open Window
            adWindow = window.open(adUrl, '_blank');

            if (!adWindow || adWindow.closed || typeof adWindow.closed === 'undefined') {
                statusMsg.innerHTML = '<div class="error-text">Popup blocked! Please allow popups.</div>';
                return;
            }

            adBtn.style.display = 'none';
            proBtn.style.display = 'none';
            statusMsg.innerHTML = `Verifying ad view: <span class="timer-text">${timeLeft}s</span>`;

            // Start Monitoring
            monitorInterval = setInterval(function() {
                if (!adWindow || adWindow.closed) {
                    checkFails++;
                    if (checkFails > 2) {
                        clearInterval(monitorInterval);
                        statusMsg.innerHTML = '<div class="error-text">Failed. Window closed early.</div>';
                        adBtn.style.display = 'block';
                        proBtn.style.display = 'block';
                        adBtn.textContent = 'Try Again';
                        return;
                    }
                } else {
                    checkFails = 0;
                    timeLeft--;
                }

                if (timeLeft > 0) {
                    statusMsg.innerHTML = `Verifying ad view: <span class="timer-text">${Math.max(0, timeLeft)}s</span>`;
                } else {
                    clearInterval(monitorInterval);
                    grantReward();
                }
            }, 1000);
        };

        function grantReward() {
            if (!extId) {
                statusMsg.innerHTML = '<div class="error-text">Error: Missing extId.</div>';
                return;
            }

            statusMsg.innerHTML = '<span class="success-text">Ad verified! Funding wallet...</span>';

            if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
                chrome.runtime.sendMessage(extId, { action: 'AD_COMPLETED' }, (response) => {
                    if (response && response.success) {
                        updateToSuccess();
                    } else {
                        statusMsg.innerHTML = '<div class="error-text">Sync error. Please keep extension open.</div>';
                        adBtn.style.display = 'block';
                        proBtn.style.display = 'block';
                    }
                });
            } else {
                updateToSuccess(); // Fallback for testing
            }
        }

        function updateToSuccess() {
            iconBox.innerHTML = "✅";
            iconBox.style.background = "rgba(0, 242, 254, 0.1)";
            document.getElementById('title').textContent = "Success!";
            document.getElementById('desc').textContent = "10 coins added to your reward balance.";
            statusMsg.innerHTML = '<span class="success-text">Success! Closing window...</span>';
            setTimeout(() => window.close(), 3000);
        }
    </script>
</body>
</html>
